<html>
    <head>
        <meta charset="utf-8"/>
        <link rel ="stylesheet" href= "./styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body>
        <section id="seleccionar-mascota">
            <h1 class="titulo">Mokepon</h1>
            <h2 class="subtitulo">Elige a tu mascota:</h2>

            <div id='contenedorTarjetas' class="tarjetas">
               
            </div>

            <button id="bottom-mascota">Seleccionar</button>
        </section>

        <section id="ver-mapa">
            <h2 class ="subtitulo">Recorre el mapa con tu mokepon</h2>
            <canvas id="mapa" width="400" height="300"></canvas>
            <div class="move-buttons">
                <button class="btn up"    onmousedown="moverArriba()"    onmouseup="detenerMovimiento()" ontouchstart="event.preventDefault(); moverArriba()"    ontouchend="detenerMovimiento()">Arriba</button>
                <button class="btn left"  onmousedown="moverIzquierda()" onmouseup="detenerMovimiento()" ontouchstart="event.preventDefault(); moverIzquierda()" ontouchend="detenerMovimiento()">Izquierda</button>
                <button class="btn down"  onmousedown="moverAbajo()"     onmouseup="detenerMovimiento()" ontouchstart="event.preventDefault(); moverAbajo()"     ontouchend="detenerMovimiento()">Abajo</button>
                <button class="btn right" onmousedown="moverDerecha()"   onmouseup="detenerMovimiento()" ontouchstart="event.preventDefault(); moverDerecha()"   ontouchend="detenerMovimiento()">Derecha</button>
            </div>

        </section>

        <section id="seleccionar-ataque">
            <h1 class="titulo">Mokepon</h1>
            <h2 class="subtitulo">Elige a tu ataque:</h2>
            <p id="indicador-turno" class="subtitulo"></p>

            <div class="arena">
                <div class="lado-jugador">
                    <p id="mascota-jugador"></p>
                    <p>Tu mascota tiene <span id="vidas-jugador">3</span> vidas</p>
                    <img id="imagen-jugador" src="" alt="mascota jugador">
                </div>
                <div class="lado-enemigo">
                    <p id="mascota-enemigo"></p>
                    <p>El enemigo tiene <span id="vidas-enemigo">3</span> vidas</p>
                    <img id="imagen-enemigo" src="" alt="mascota enemigo">
                </div>
            </div>

            <div id='contenedorAtaques' class="tarjetas-ataques"></div>

            <button id="bottom-reiniciar">Reiniciar</button>

            <section id="Mensajes">
                <p id="resultado"></p>
            </section>

            <div class="ataques">
                <div id="historial-resultado"></div>
            </div>
        </section>
        <script src="./js/mokepon.js"></script>
    </body>
</html>
